<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axid AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-300 min-h-screen">

    <!-- NAVIGATION -->
    <nav class="flex items-center justify-between px-8 py-6 border-b border-zinc-900">
        <div class="font-bold text-white cursor-pointer" id="nav-logo">Axid AI</div>
        <div class="flex items-center space-x-6 text-sm">
            <button id="btn-nav-home" class="hover:text-white">Home</button>
            <button id="btn-nav-about" class="hover:text-white">About</button>
            <button id="btn-nav-chat" class="hover:text-white">Chat</button>
            <button id="btn-nav-contact" class="hover:text-white">Contact</button>
            <button id="btn-nav-feedback" class="hover:text-white">Feedback</button>
            <button class="text-white">Sign out</button>
        </div>
    </nav>

    <!-- VIEWS -->
    <main id="view-home" class="app-view p-20 text-center">
        <h1 class="text-6xl font-bold text-white">Axid AI</h1>
        <p class="mt-4 text-zinc-500">Your futuristic AI assistant for everything.</p>
        <button id="btn-hero-start" class="mt-8 bg-white text-black px-6 py-3 rounded-xl font-bold">Start Chatting →</button>
    </main>

    <main id="view-about" class="app-view hidden p-10 max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-white mb-8">About Axid AI</h1>
    </main>

    <main id="view-chat" class="app-view hidden h-[calc(100vh-80px)] flex">
        <div class="w-64 border-r border-zinc-900 p-4">
            <div class="bg-zinc-900 p-3 rounded-lg">+ New chat</div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold text-white mb-4">How can I help you today?</h2>
            <form id="chat-form" class="w-full max-w-2xl px-4">
                <input type="text" id="chat-input" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 text-white" placeholder="Message Axid AI...">
            </form>
        </div>
    </main>

    <main id="view-contact" class="app-view hidden p-20 text-center">
        <h1 class="text-4xl font-bold text-white">Contact Axid AI</h1>
    </main>

    <main id="view-feedback" class="app-view hidden p-20 text-center">
        <h1 class="text-4xl font-bold text-white">Feedback</h1>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
