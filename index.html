<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Axid AI Mini</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #0f172a;

    color: white;

    display: flex;

    height: 100vh;

    flex-direction: column;

}

header {

    padding: 15px;

    background: #111827;

    text-align: center;

    font-size: 20px;

    font-weight: bold;

}

#chat {

    flex: 1;

    padding: 10px;

    overflow-y: auto;

}

.message {

    margin: 10px 0;

    padding: 10px;

    border-radius: 10px;

    max-width: 80%;

}

.user {

    background: #2563eb;

    margin-left: auto;

}

.ai {

    background: #1f2937;

}

#inputArea {

    display: flex;

    padding: 10px;

    background: #111827;

}

input {

    flex: 1;

    padding: 12px;

    border: none;

    border-radius: 8px;

    outline: none;

}

button {

    margin-left: 10px;

    padding: 12px 16px;

    border: none;

    border-radius: 8px;

    background: #22c55e;

    color: black;

    font-weight: bold;

}

button:active {

    transform: scale(0.95);

}

</style>

</head>

<body>

<header>⚡ Axid AI Mini</header>

<div id="chat"></div>

<div id="inputArea">

    <input id="input" placeholder="Ask something..." />

    <button onclick="send()">Send</button>

</div>

<script>

const chat = document.getElementById("chat");

function addMessage(text, type) {

    const div = document.createElement("div");

    div.className = "message " + type;

    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

}

function fakeAIResponse(msg) {

    msg = msg.toLowerCase();

    if (msg.includes("hello")) return "Hey! I'm Axid AI Mini 🤖";

    if (msg.includes("who are you")) return "I'm a simple AI built in one file.";

    if (msg.includes("time")) return "Current time: " + new Date().toLocaleTimeString();

    if (msg.includes("joke")) return "Why? Because JavaScript never sleeps 😆";

    

    return "I heard: " + msg + " (but I’m still learning)";

}

function send() {

    const input = document.getElementById("input");

    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");

    input.value = "";

    setTimeout(() => {

        const reply = fakeAIResponse(text);

        addMessage(reply, "ai");

    }, 500);

}

</script>

</body>

</html>
