<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axid AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-300 min-h-screen">

    <!-- NAVIGATION -->
    <nav class="flex items-center justify-between px-8 py-6 border-b border-zinc-900">
        <div class="font-bold text-white cursor-pointer" id="nav-logo">Axid AI</div>
        <div class="flex items-center space-x-6 text-sm">
            <button id="btn-home" class="hover:text-white">Home</button>
            <button id="btn-about" class="hover:text-white">About</button>
            <button id="btn-chat" class="hover:text-white">Chat</button>
            <button id="btn-contact" class="hover:text-white">Contact</button>
            <button id="btn-feedback" class="hover:text-white">Feedback</button>
            <button class="text-white">Sign out</button>
        </div>
    </nav>

    <!-- VIEWS -->
    <main id="view-home" class="app-view p-20 text-center">
        <h1 class="text-6xl font-bold text-white">Axid AI</h1>
        <p class="mt-4 text-zinc-500">Your futuristic AI assistant for everything.</p>
        <button id="btn-start-chat" class="mt-8 bg-white text-black px-6 py-3 rounded-xl font-bold">Start Chatting →</button>
    </main>

    <main id="view-about" class="app-view hidden p-20 text-center">
        <h1 class="text-4xl font-bold text-white">About Axid AI</h1>
    </main>

    <main id="view-chat" class="app-view hidden h-[calc(100vh-80px)] flex">
        <div class="w-64 border-r border-zinc-900 p-4">
            <div class="bg-zinc-900 p-3 rounded-lg text-sm cursor-pointer">+ New chat</div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold text-white mb-4">How can I help you today?</h2>
            <form id="chat-form" class="w-full max-w-2xl px-4">
                <input type="text" id="chat-input" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 text-white" placeholder="Message Axid AI...">
            </form>
            <div id="chat-logs" class="w-full max-w-2xl px-4 mt-4 space-y-2"></div>
        </div>
    </main>

    <main id="view-contact" class="app-view hidden p-20 text-center">
        <h1 class="text-4xl font-bold text-white">Contact Axid AI</h1>
    </main>

    <main id="view-feedback" class="app-view hidden p-20 text-center">
        <h1 class="text-4xl font-bold text-white">Feedback</h1>
    </main>

    <!-- JS LOGIC IS NOW HERE, NOT IN A SEPARATE FILE -->
    <script type="module">
        import { GoogleGenerativeAI } from "https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.3/+esm";

        const API_KEY = "AQ.Ab8RN6K5_0xKQ7Tox7Mp-v_dsQDqDd9AwRCMok8vHqT8CHRc2g";

        // View Switcher
        function switchView(viewId) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById('view-' + viewId);
            if (target) target.classList.remove('hidden');
        }

        // AI Logic
        async function askAI(prompt) {
            const logs = document.getElementById('chat-logs');
            logs.innerHTML += `<div class="p-3 bg-zinc-900 rounded-lg text-white">User: ${prompt}</div>`;
            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(prompt);
                logs.innerHTML += `<div class="p-3 text-zinc-300">Axid AI: ${result.response.text()}</div>`;
            } catch (e) {
                logs.innerHTML += `<div class="p-3 text-red-500">Error: Check connection.</div>`;
            }
        }

        // Button Listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-logo').addEventListener('click', () => switchView('home'));
            document.getElementById('btn-home').addEventListener('click', () => switchView('home'));
            document.getElementById('btn-about').addEventListener('click', () => switchView('about'));
            document.getElementById('btn-chat').addEventListener('click', () => switchView('chat'));
            document.getElementById('btn-contact').addEventListener('click', () => switchView('contact'));
            document.getElementById('btn-feedback').addEventListener('click', () => switchView('feedback'));
            document.getElementById('btn-start-chat').addEventListener('click', () => switchView('chat'));

            document.getElementById('chat-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                if (input.value.trim()) {
                    askAI(input.value.trim());
                    input.value = '';
                }
            });
        });
    </script>
</body>
</html>
